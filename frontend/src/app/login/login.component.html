<div class="login-container">
    <h1>Login Page</h1>

    <form (ngSubmit)="login()">

        <div class="form-group">
            <label>Username</label>
            <input type="text" [(ngModel)] = 'username' [ngModelOptions]="{standalone:true}" name="username" placeholder="Username">
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" [(ngModel)] = 'password' [ngModelOptions]="{standalone:true}" name="password" placeholder="Password">
        </div>

        <button type="submit" class="btn btn-primary mt-4">Login</button>

        <button type="button" class="btn btn-success" (click)="goToRegister()">Register</button>
    </form>
</div>
